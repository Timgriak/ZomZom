<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZomZom</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="hud" aria-label="Game status">
        <div>
          <span class="label">Health</span>
          <strong id="healthValue">100</strong>
        </div>
        <div>
          <span class="label">Ammo</span>
          <strong id="ammoValue">24</strong>
        </div>
        <div>
          <span class="label">AP</span>
          <strong id="apValue">2</strong>
        </div>
        <div>
          <span class="label">Turn</span>
          <strong id="turnValue">Player</strong>
        </div>
        <button id="endTurnButton" type="button">End Turn</button>
      </section>

      <canvas id="game" width="960" height="640" aria-label="Isometric zombie tactics game"></canvas>

      <section class="controls" aria-label="Controls">
        <span><kbd>LMB</kbd> move / shoot</span>
        <span><kbd>Space</kbd> end turn</span>
        <span><kbd>R</kbd> restart</span>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
